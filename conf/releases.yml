# conf/releases.yml is the single source of truth for the website's view of
# the Apache Grails release inventory. It has two top-level sections:
#
#   companionArtifacts: per-Grails-major Apache-released companion artifacts
#                       (Spring Security, Redis, Quartz, etc.) with their own
#                       independent versions. Keyed by Grails major version.
#                       Populated by the recordCompanionRelease Gradle task.
#
#   coreReleases:       the flat append-only list of every Grails core release
#                       ever shipped, optionally annotated with a publicationDate.
#                       Appended by the recordRelease Gradle task on release day.
#
# coreReleases: is intentionally placed last so that recordRelease's plain
# append-to-end-of-file produces a valid YAML structure without any structural
# parsing on the task side.
#
# The legacy top-level key was `releases:` - SiteMap accepts either spelling
# during the migration window. New tooling should write `coreReleases:`.
companionArtifacts:
  # Per Grails major version, the companion Apache plugins that ship alongside
  # Grails core. Each entry pins the artifact version and the Apache mirror
  # subdirectory used by DownloadPage to build distribution URLs.
  #
  # Schema per entry:
  #   artifactId        Maven artifact id, also the file name slug used in the
  #                     mirror URL (apache-<artifactId>-<version>-bin.zip).
  #   version           The plugin's own version (independent of grails core).
  #   mirrorDirectory   Sub-path under https://www.apache.org/dyn/closer.lua/grails/
  #                     where the artifact's distribution lives.
  #   releaseNotesRepo  GitHub slug (org/repo) used for the v<version> release-notes
  #                     link. Per the migration plan this stays as GitHub for now.
  #   displayName       Human-readable label rendered on the downloads page.
  '7':
    - artifactId: grails-quartz
      version: '4.0.1'
      mirrorDirectory: quartz
      releaseNotesRepo: apache/grails-quartz
      displayName: Grails Quartz Plugin
    - artifactId: grails-github-actions
      version: '1.0.3'
      mirrorDirectory: actions
      releaseNotesRepo: apache/grails-github-actions
      displayName: Grails GitHub Actions
    - artifactId: grails-publish
      version: '0.0.5'
      mirrorDirectory: grails-publish
      releaseNotesRepo: apache/grails-gradle-publish
      displayName: Grails Publish Gradle Plugin
  '8':
    - artifactId: grails-publish
      version: '1.0.0-M2'
      mirrorDirectory: grails-publish
      releaseNotesRepo: apache/grails-gradle-publish
      displayName: Grails Publish Gradle Plugin

